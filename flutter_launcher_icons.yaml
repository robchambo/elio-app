# flutter_launcher_icons configuration
# Run: flutter pub run flutter_launcher_icons
#
# Source: assets/icon/app_icon.png (1024×1024). Kate's final brand icon
# landed 21 May 2026 — terracotta "elio" wordmark on cream with leaf
# watermark. Replaces the Sprint 7 placeholder.

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 23
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false
  # Android 8+ adaptive icon: foreground is the same artwork, background
  # is the cream colour from the source so the icon's negative space
  # blends seamlessly across launcher themes. Pre-Sprint-16 this was
  # navy (`#1A2744` / ElioColors.navy from the old palette); updated
  # alongside Kate's final brand icon.
  adaptive_icon_background: "#F4E5D0"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true
